name: Azure Static Web Apps CI/CD (ClinicDemoClient)

# Builds and deploys the React SPA to the Azure Static Web App "ClinicDemoClient".
# Pull requests get an ephemeral preview environment; closing the PR tears it down.
#
# Required GitHub secret (created automatically by Azure when the SWA was linked to the repo):
#   AZURE_STATIC_WEB_APPS_API_TOKEN_BLUE_FOREST_0DF195910
#
# Build-time env vars point the SPA at the deployed API and force the demo tenant
# (the SWA subdomain is not a real tenant).

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    env:
      VITE_API_URL: https://clinicdemoapi-accybtbjdfcvcce4.canadacentral-01.azurewebsites.net
      VITE_TENANT: demo
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_BLUE_FOREST_0DF195910 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: 'src/AEspejo.Clinic.Client'   # app source
          output_location: 'dist'                      # Vite build output
        env:
          VITE_API_URL: ${{ env.VITE_API_URL }}
          VITE_TENANT: ${{ env.VITE_TENANT }}

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_BLUE_FOREST_0DF195910 }}
          action: close
